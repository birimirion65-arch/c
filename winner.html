<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>当選おめでとうございます</title>
<meta name="robots" content="noindex,nofollow">

<style>
:root{
  --bg1:#0b1020;
  --bg2:#081326;
  --green:#22c55e;
  --green2:#16a34a;
}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP";
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:white;
}
.card{
  width:min(720px,95%);
  padding:50px 24px;
  border-radius:20px;
  background:rgba(255,255,255,.06);
  text-align:center;
  box-shadow:0 30px 90px rgba(0,0,0,.6);
}
h1{font-size:28px;margin-bottom:10px;}
.badge{
  display:inline-block;
  margin:12px 0;
  padding:6px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  font-size:13px;
}
.amount{
  font-size:48px;
  font-weight:900;
  color:var(--green);
  margin:20px 0;
}
.cta{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🎉 当選おめでとうございます 🎉</h1>

  <div class="badge">【20歳以上限定】</div>

  <div class="amount">350,000円</div>

  <p>下のボタンからお受け取りください。</p>

  <div class="cta">
  <a href="https://lin.ee/81Ancoa">
  <img src="https://scdn.line-apps.com/n/line_add_friends/btn/th.png"
  alt="LINE友だち追加" height="36" border="0">
  </a>
  </div>

</div>

</body>
</html>
